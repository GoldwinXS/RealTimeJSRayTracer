<!DOCTYPE html>
<html lang="en">

<head>
    <title>Ray Tracer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <link href="/styles.css" rel="stylesheet">
</head>

<body>
    <div id="react-root"></div>

    <div id="container">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">+</div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-level">Loading...</div>
        <div id="hud-objective"></div>
    </div>

    <!-- Pickup/drop prompt (center bottom) -->
    <div id="hud-prompt" style="display:none"></div>

    <!-- Level complete banner -->
    <div id="hud-complete"></div>

    <!-- Mobile control hint (shown only on touch devices via CSS) -->
    <div id="mobile-hint">Left side: move &nbsp;|&nbsp; Right side: look</div>

    <div id="cameraInfo" style="position:fixed; left:3%; bottom:2%; font-family:arial; color:rgb(255,255,255);"></div>

    <script type="module" src="./main.js"></script>
</body>

</html>
